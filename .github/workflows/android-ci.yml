name: Android CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Add Android SDK to PATH
        run: echo "${ANDROID_HOME}/cmdline-tools/latest/bin" >> "$GITHUB_PATH"

      - name: Install Android SDK components
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager --install "platforms;android-36" "build-tools;35.0.0" "platform-tools"

      - name: Generate local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Ensure Gradle wrapper executable
        run: chmod +x gradlew

      - name: Create placeholder google-services.json for CI
        shell: bash
        run: |
          cat > app/google-services.json <<'JSON'
          {
            "project_info": {
              "project_number": "1234567890",
              "project_id": "cinefin-ci",
              "storage_bucket": "cinefin-ci.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:1234567890:android:abcdef123456",
                  "android_client_info": {
                    "package_name": "com.rpeters.jellyfin"
                  }
                },
                "api_key": [
                  {
                    "current_key": "ci-placeholder-key"
                  }
                ]
              }
            ],
            "configuration_version": "1"
          }
          JSON

      - name: Build debug APK
        run: ./gradlew --no-daemon --stacktrace :app:assembleDebug

      - name: Run unit tests
        run: ./gradlew --no-daemon --stacktrace :app:testDebugUnitTest

      - name: Run lint
        run: ./gradlew --no-daemon --stacktrace :app:lintDebug

      - name: Enforce warning budget baseline
        run: ./gradlew --no-daemon --stacktrace verifyWarningBudget

      - name: Upload debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
          retention-days: 14

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: |
            app/build/reports/tests/testDebugUnitTest/**
            app/build/test-results/testDebugUnitTest/**
          if-no-files-found: warn
          retention-days: 14

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: |
            app/build/reports/lint-results-debug.*
            app/build/reports/lint-results-*.html
            app/build/reports/lint-results-*.xml
            app/build/reports/lint-results-*.sarif
            app/build/reports/warnings/warning-budget-summary.md
          if-no-files-found: warn
          retention-days: 14
